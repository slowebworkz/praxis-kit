id: adapter-raw-contract-import
language: TypeScript
severity: warning
message: |
  Adapter importing directly from @praxis-ui/contract instead of @praxis-ui/core/contract.
  Use the @praxis-ui/core sub-entry to stay within the public API facade.
rule:
  any:
    - pattern: "import $NAMES from '@praxis-ui/contract'"
    - pattern: "import type $NAMES from '@praxis-ui/contract'"
files:
  - adapters/react/src/**
  - adapters/vue/src/**
  - adapters/preact/src/**
  - adapters/solid/src/**
  - adapters/svelte/src/**
