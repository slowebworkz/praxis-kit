name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Duplicate Analysis
        run: pnpm analyze:duplicates

      - name: Repo State
        run: pnpm repo-state

      - name: Dependency Analysis
        run: pnpm analyze:deps

      - name: Structural Analysis
        run: pnpm analyze:patterns

      - name: Metrics
        run: pnpm metrics:collect && pnpm metrics:assert
