name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Build, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v6
        with:
          version: 11.0.4

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # examples/* depend on praxis-kit/<adapter> (packages/kit's published subpaths),
      # which only exist once packages/kit is built — pnpm check (lint/typecheck/test)
      # runs before the general "Build" step below, so build it explicitly first.
      # scripts/build-pipeline.ts encodes this ordering once for both CI and local use.
      - name: Verify
        run: pnpm verify

      - name: Build
        run: pnpm build

      - name: Duplicate Analysis
        run: pnpm analyze:duplicates

      - name: Repo State
        run: pnpm repo-state

      - name: Dependency Analysis
        run: pnpm analyze:deps

      - name: Structural Analysis
        run: pnpm analyze:patterns

      - name: Metrics
        run: pnpm metrics:collect && pnpm metrics:assert
