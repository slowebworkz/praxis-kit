name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint:check

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test:ci

      - name: Duplicate Analysis
        run: pnpm analyze:duplicates

      - name: Dependency Analysis
        run: pnpm analyze:deps

      - name: Structural Analysis
        run: pnpm analyze:patterns
