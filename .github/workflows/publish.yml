name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter "./packages/*" --filter "./lib/*" build

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Resolve dist-tag
        id: dist_tag
        run: |
          version=$(node -p "require('./adapters/react/package.json').version")
          if echo "$version" | grep -qE '-(alpha|beta|rc)'; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for unresolved catalog specifiers
        run: |
          failed=0
          for pkg in adapters/react adapters/preact adapters/solid adapters/svelte adapters/vue adapters/lit adapters/web packages/tailwind packages/eslint-plugin packages/ts-plugin packages/vite-plugin packages/codemod; do
            tmpdir=$(mktemp -d)
            (cd "$pkg" && pnpm pack --pack-destination "$tmpdir" 2>/dev/null)
            if tar -xzf "$tmpdir"/*.tgz -C "$tmpdir" && grep -rF "\"catalog:" "$tmpdir/package/package.json" 2>/dev/null; then
              echo "ERROR: $pkg published package.json contains unresolved catalog: specifiers"
              failed=1
            fi
            rm -rf "$tmpdir"
          done
          exit $failed

      - name: Publish
        run: |
          for pkg in adapters/react adapters/preact adapters/solid adapters/svelte adapters/vue adapters/lit adapters/web packages/tailwind packages/eslint-plugin packages/ts-plugin packages/vite-plugin packages/codemod; do
            name=$(node -p "require('./$pkg/package.json').name")
            version=$(node -p "require('./$pkg/package.json').version")
            if npm view "$name@$version" version &>/dev/null; then
              echo "Skipping $name@$version — already published"
            else
              (cd "$pkg" && pnpm publish --access public --no-git-checks --tag ${{ steps.dist_tag.outputs.tag }})
              sleep 5
            fi
          done
