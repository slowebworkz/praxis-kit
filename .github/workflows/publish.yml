name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter "./packages/*" --filter "./lib/*" build

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check for unresolved catalog specifiers
        run: |
          failed=0
          for pkg in packages/react packages/vue packages/solid packages/svelte packages/preact packages/lit packages/web packages/tailwind packages/eslint-plugin packages/ts-plugin packages/vite-plugin; do
            tarball=$(cd "$pkg" && pnpm pack --dry-run 2>/dev/null | grep '\.tgz$' | awk '{print $1}')
            tmpdir=$(mktemp -d)
            (cd "$pkg" && pnpm pack --pack-destination "$tmpdir" 2>/dev/null)
            if tar -xzf "$tmpdir"/*.tgz -C "$tmpdir" && grep -r '"catalog:' "$tmpdir/package/package.json" 2>/dev/null; then
              echo "ERROR: $pkg published package.json contains unresolved catalog: specifiers"
              failed=1
            fi
            rm -rf "$tmpdir"
          done
          exit $failed

      - name: Publish
        run: |
          for pkg in packages/react packages/vue packages/solid packages/svelte packages/preact packages/lit packages/web packages/tailwind packages/eslint-plugin packages/ts-plugin packages/vite-plugin; do
            (cd "$pkg" && pnpm publish --access public --no-git-checks)
          done
