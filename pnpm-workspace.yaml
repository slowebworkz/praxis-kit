  react-dom: ^19.0.0
  tsup: ^8.5.1
  type-fest: ^5.4.4
  typescript: ^5.6.3
  typescript-eslint: 8.59.4
  "@typescript-eslint/utils": 8.60.0
  "@typescript-eslint/rule-tester": 8.59.4
  vitest: ^4.1.6
